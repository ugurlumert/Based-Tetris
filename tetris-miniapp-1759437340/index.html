<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TetriTiny</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <h1 id="rank-banner">Connect wallet to see your rank</h1>
    <canvas id="tetris" width="240" height="400"></canvas>
    
    <div class="info">
      <h2>TetriTiny</h2>
      <button id="connectWallet">🔗 Connect Wallet</button>
      <p id="walletAddress">Address: Not connected</p>
      <p id="xp">XP: 0</p>
      <p id="score">Score: 0</p>
      <p id="lines">Lines: 0</p>
      <p id="level">Level: 1</p>
      <button id="startButton">Start</button>
      <button id="finishButton">Finish</button>
    </div>
  </div>

  <!-- Game + Wallet Scripts -->
  <script src="wallet.js"></script>
  <script src="tetris.js"></script>

  <!-- Farcaster Mini App SDK -->
  <script src="https://unpkg.com/@farcaster/frame-sdk/dist/index.umd.js"></script>
  <script>
    window.addEventListener("load", () => {
      // Farcaster'a "uygulama hazır" bilgisini gönder
      if (window?.farcaster?.actions?.ready) {
        window.farcaster.actions.ready();
        console.log("✅ Farcaster Mini App ready() çağrıldı.");
      } else {
        console.log("⚠️ Farcaster SDK bulunamadı.");
      }
    });
  </script>
</body>
</html>
