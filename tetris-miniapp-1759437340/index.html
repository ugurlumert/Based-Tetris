<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TetriTiny</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1b2d" />
  <meta name="color-scheme" content="dark light" />

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="TetriTiny — Onchain Tetris" />
  <meta property="og:description" content="Play Tetris, earn XP on Base, and see your personal rank." />
  <meta property="og:image" content="https://based-tetris.vercel.app/cover.png" />
  <meta property="og:url" content="https://based-tetris.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TetriTiny — Onchain Tetris" />
  <meta name="twitter:description" content="Play Tetris, earn XP on Base, and see your personal rank." />
  <meta name="twitter:image" content="https://based-tetris.vercel.app/cover.png" />

  <!-- Farcaster Mini App embed (3:2) -->
  <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://based-tetris.vercel.app/cover-1200x800.png","button":{"title":"Open TetriTiny"}}'>

  <!-- Icons -->
  <link rel="icon" href="/icon.png" />
  <link rel="apple-touch-icon" href="/icon-1024.png" />

  <!-- (opsiyonel) harici stilin varsa kalabilir -->
  <link rel="stylesheet" href="style.css" />

  <style>
    :root { --card-w: clamp(320px, 86vw, 480px); }
    html, body { background:#0f1b2d; color:#e6fbff; margin:0; padding:0; }
    .banner{
      width:100%; text-align:center; padding:10px 12px; background:#12223d; color:#e6fbff;
      border-bottom:1px solid #2b3e69; font-weight:700; letter-spacing:.2px
    }
    .me{font-weight:700;color:#00ffcc}
    .container{
      max-width: var(--card-w);
      margin: 14px auto 88px; /* alttaki kontrol barına yer bırak */
      display: grid; gap: 14px; padding: 0 10px;
    }
    .game-card{
      background:#0d1626; border:1px solid #233452; border-radius:14px; padding:14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    /* Canvas responsive */
    #tetris{
      display:block; width:100%; height:auto; border-radius:10px; background:#091426;
      touch-action:none; /* jestler için tarayıcı hareketlerini kapat */
    }
    .side h1{ margin:8px 0 12px; font-size:28px; }
    .row{ display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 10px; align-items:center }
    button{
      appearance:none; border:none; border-radius:10px; padding:10px 14px;
      background:#1b2a45; color:#e6fbff; font-weight:600; cursor:pointer;
      box-shadow: inset 0 0 0 1px #2b3e69; touch-action:manipulation;
    }
    button:hover{ background:#20355a; }
    .stats p{ margin:4px 0; }
    ul#leaderboard{ margin:8px 0 0; padding:0 0 0 16px; }

    /* Countdown pill */
    .timer{
      margin-left:auto; padding:8px 12px; border-radius:999px;
      background:#172746; border:1px solid #2b3e69; font-weight:700;
      letter-spacing:.3px; min-width:88px; text-align:center; user-select:none;
    }
    .timer.warn{ background:#2a1e1e; border-color:#6b2b2b }

    /* Mobile control bar (only on touch devices) */
    .mobile-controls{
      position:fixed; left:0; right:0; bottom:0;
      padding: max(8px, env(safe-area-inset-bottom)) 12px 12px 12px;
      background: linear-gradient(180deg, rgba(10,16,28,.0), rgba(10,16,28,.85) 30%, rgba(10,16,28,.95));
      border-top:1px solid #233452; backdrop-filter: blur(6px);
      display:none; /* default kapalı; touch'ta açacağız */
      z-index: 50;
    }
    .mobile-controls .grid{
      max-width: var(--card-w); margin:0 auto;
      display:grid; grid-template-columns: repeat(5,1fr); gap:10px;
    }
    .ctrl {
      border:1px solid #2b3e69; border-radius:14px; padding:12px; text-align:center;
      background:#0d1626; font-size:18px; font-weight:800; user-select:none;
      touch-action:manipulation;
    }
    .ctrl:active{ transform: translateY(1px); }
    .ctrl.small{ font-size:16px }
    /* Sadece kaba işaretçi (parmak) cihazlarda göster */
    @media (pointer:coarse){ .mobile-controls{ display:block; } }
  </style>

  <!-- Farcaster Mini Apps SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@farcaster/mini-apps-sdk@latest/dist/browser/mini-apps-sdk.umd.js"></script>
  <script>
    function fcReady() {
      const cands = [
        window?.FarcasterMiniAppsSDK?.actions,
        window?.farcaster?.actions,
        window?.warpcast?.actions,
        window?.sdk?.actions
      ];
      for (const a of cands) { try { if (a && typeof a.ready === 'function') { a.ready(); break; } } catch(_){} }
    }
    document.addEventListener('DOMContentLoaded', () => setTimeout(fcReady, 0));
    // Klavye ile oynarken sayfa kaymasını engelle
    window.addEventListener('keydown', (e)=>{
      if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    }, { passive:false });
  </script>
</head>
<body>
  <div id="myRankBanner" class="banner">Connect wallet to see your rank</div>

  <div class="container">
    <div class="game-card">
      <canvas id="tetris" width="240" height="400" aria-label="TetriTiny game canvas"></canvas>
    </div>

    <div class="side game-card">
      <h1>TetriTiny</h1>
      <div class="row">
        <button id="connect">🔗 Connect Wallet</button>
        <button id="startButton">Start</button>
        <button id="finishButton">Finish</button>
        <!-- COUNTDOWN -->
        <div id="countdown" class="timer" aria-live="polite" title="Time Left">⏱ 01:00</div>
      </div>

      <div class="stats">
        <p>Address: <span id="addr">Not connected</span></p>
        <p>XP: <span id="xp">0</span></p>
        <p>Score: <span id="score">0</span></p>
        <p>Lines: <span id="lines">0</span></p>
        <p>Level: <span id="level">1</span></p>
      </div>

      <h2>Your Rank</h2>
      <ul id="leaderboard"></ul>
    </div>
  </div>

  <!-- MOBILE CONTROL BAR -->
  <div class="mobile-controls" id="mobileControls" aria-label="Touch controls">
    <div class="grid">
      <div class="ctrl" data-key="ArrowLeft">◀</div>
      <div class="ctrl" data-key="ArrowRight">▶</div>
      <div class="ctrl" data-key="ArrowUp" title="Rotate">⟳</div>
      <div class="ctrl" data-key="ArrowDown" title="Soft drop">⬇</div>
      <div class="ctrl small" data-key="Space" title="Hard drop">⬇⬇</div>
    </div>
  </div>

  <!-- Game core -->
  <script src="tetris.js"></script>

  <!-- Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- Wallet + XP + Rank + Touch + Turbo + Countdown + On-screen controls -->
  <script>
  (function(){
    const CONTRACT_ADDRESS = "0x1F268942987EE88397e6263b3Eff23a2840F31AD";
    const DEPLOY_BLOCK     = 36327995; // Basescan deploy block

    const BASE_PARAMS = {
      chainId: '0x2105',
      chainName: 'Base Mainnet',
      nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
      rpcUrls: ['https://base.llamarpc.com'],
      blockExplorerUrls: ['https://basescan.org/']
    };
    const ABI = [
      "event XpRecorded(address indexed player, uint256 amount, uint256 newTotal, bytes32 sessionId)",
      "function record(uint256 amount, bytes32 sessionId) external",
      "function totalXp(address) view returns (uint256)"
    ];

    let currentAddress = null; // lowercased
    let xp = 0, sessionXp = 0;

    /* ---------- utils ---------- */
    function synthKey(key){
      const ev = new KeyboardEvent('keydown', { key, code:key, bubbles:true });
      window.dispatchEvent(ev); document.dispatchEvent(ev);
    }
    function vibrate(ms){ try{ navigator.vibrate?.(ms); }catch(_){} }

    /* ---------- wallet ---------- */
    async function ensureBaseNetwork(provider){
      const chainId = await provider.send('eth_chainId', []);
      if (chainId !== BASE_PARAMS.chainId) {
        try{ await provider.send('wallet_switchEthereumChain', [{ chainId: BASE_PARAMS.chainId }]); }
        catch(e){
          if (e.code === 4902 || String(e.message||'').includes('Unrecognized chain ID')){
            await provider.send('wallet_addEthereumChain', [BASE_PARAMS]);
          } else { throw e; }
        }
      }
    }
    async function connectWallet(){
      if (!window.ethereum){ alert("MetaMask / Coinbase Wallet gerekiyor."); throw new Error("no-ethereum"); }
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      await ensureBaseNetwork(provider);
      const signer = provider.getSigner();
      currentAddress = (await signer.getAddress()).toLowerCase();
      document.getElementById("addr").textContent =
        currentAddress.slice(0,6) + "..." + currentAddress.slice(-4);
      loadXPFromStorage();
      fetchAndRenderMyRank().catch(console.error);
    }
    document.getElementById("connect").addEventListener("click", ()=>{ connectWallet().catch(console.error); });
    if (window.ethereum){
      window.ethereum.on?.('accountsChanged', ()=>{ connectWallet().catch(console.error); });
      window.ethereum.on?.('chainChanged',   ()=>{ connectWallet().catch(console.error); });
    }

    /* ---------- XP (UI + localStorage) ---------- */
    function loadXPFromStorage(){
      if (!currentAddress) return;
      const saved = localStorage.getItem("xp_" + currentAddress);
      xp = saved ? parseInt(saved,10) : 0; updateXPUI();
    }
    function addXP(amount){
      sessionXp += amount; xp += amount;
      if (currentAddress){ localStorage.setItem("xp_" + currentAddress, String(xp)); }
      updateXPUI();
    }
    function updateXPUI(){ const el = document.getElementById("xp"); if (el) el.textContent = xp; }

    /* ---------- On-chain XP ---------- */
    async function flushXP(){
      if (!currentAddress || sessionXp <= 0) return;
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await ensureBaseNetwork(provider);
      const signer = provider.getSigner();
      const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      const sessionId = ethers.utils.hexlify(ethers.utils.randomBytes(32));
      try{
        const tx = await contract.record(ethers.BigNumber.from(sessionXp), sessionId);
        await tx.wait(); sessionXp = 0; await fetchAndRenderMyRank();
      }catch(e){
        console.error("record() failed:", e);
        alert("XP kaydedilemedi: " + (e?.data?.message || e?.message || e));
      }
    }

    /* ---------- Farcaster handle ---------- */
    async function getFarcasterHandle(addr){
      try{
        const resp = await fetch(`https://api.neynar.com/v2/farcaster/user-by-verification?address=${addr}`, {
          headers: { "accept":"application/json", "api_key":"NEYNAR_ANON_API_KEY" }
        });
        if (!resp.ok) throw new Error("neynar http " + resp.status);
        const data = await resp.json();
        if (data?.result?.user?.username) return "@"+data.result.user.username;
      }catch(e){ console.warn("farcaster lookup failed", e); }
      return null;
    }

    /* ---------- Rank ---------- */
    async function fetchAndRenderMyRank(){
      const banner = document.getElementById("myRankBanner");
      const ul = document.getElementById("leaderboard");
      banner.textContent = "Loading your rank…";
      if (!currentAddress){ banner.textContent = "Connect wallet to see your rank"; ul && (ul.innerHTML=""); return; }

      try{
        const provider = new ethers.providers.JsonRpcProvider("https://base.llamarpc.com");
        const contract  = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
        const currentBlock = await provider.getBlockNumber();

        let players = new Set();
        try{
          const events = await contract.queryFilter("XpRecorded", DEPLOY_BLOCK, currentBlock);
          events.forEach(ev => players.add(ev.args.player.toLowerCase()));
        }catch(e){ console.warn("queryFilter failed", e); }
        players.add(currentAddress);

        const all = [];
        for (const addr of players){
          try{
            const xpVal = await contract.totalXp(addr);
            all.push({ address: addr, xp: xpVal.toNumber() });
          }catch(e){ all.push({ address: addr, xp: 0 }); }
        }
        all.sort((a,b)=>b.xp - a.xp);
        const myIndex = all.findIndex(x => x.address === currentAddress);
        const myXp    = (myIndex >= 0 ? all[myIndex].xp : 0);

        const handle  = await getFarcasterHandle(currentAddress);
        const myName  = handle ? handle : (currentAddress.slice(0,6)+"..."+currentAddress.slice(-4));

        banner.textContent = `You’re #${myIndex+1} — ${myXp} XP ${handle ? "(" + handle + ")" : ""}`;
        if (ul){
          ul.innerHTML = "";
          const li = document.createElement("li");
          li.className = "me";
          li.textContent = `#${myIndex+1} ${myName} — ${myXp} XP (You)`;
          ul.appendChild(li);
        }
      }catch(e){
        console.error("my-rank fatal:", e);
        const short = currentAddress.slice(0,6)+"..."+currentAddress.slice(-4);
        banner.textContent = `You — 0 XP (${short})`;
        if (ul){
          ul.innerHTML = "";
          const li = document.createElement("li");
          li.className = "me";
          li.textContent = `#1 ${short} — 0 XP (You)`;
          ul.appendChild(li);
        }
      }
    }
    window.addEventListener("load", fetchAndRenderMyRank);

    /* ---------- Touch gestures on canvas ---------- */
    (function enableTouchGestures(){
      const HARD_DROP_ON_SWIPE_UP = false;
      const el = document.getElementById('tetris');
      const TAP_MAX_TIME_MS = 250, TAP_MAX_MOVE_PX = 12, STEP_PX = 24;
      const opts = { passive:false };
      let sx=0, sy=0, lx=0, ly=0, start=0, moved=false;

      function onStart(e){ const p=(e.touches?e.touches[0]:e); sx=lx=p.clientX; sy=ly=p.clientY; start=performance.now(); moved=false; }
      function onMove(e){
        const p=(e.touches?e.touches[0]:e), dx=p.clientX-lx, dy=p.clientY-ly;
        const stepsX=Math.trunc(dx/STEP_PX);
        if(stepsX!==0){ for(let i=0;i<Math.abs(stepsX);i++) synthKey(stepsX>0?'ArrowRight':'ArrowLeft'); lx+=stepsX*STEP_PX; moved=true; }
        const stepsDown=Math.trunc((p.clientY-ly)/STEP_PX);
        if(stepsDown>0){ for(let i=0;i<stepsDown;i++) synthKey('ArrowDown'); ly+=stepsDown*STEP_PX; moved=true; }
        if(HARD_DROP_ON_SWIPE_UP){
          const stepsUp=Math.trunc((ly-p.clientY)/(STEP_PX*2));
          if(stepsUp>0){ synthKey('Space'); lx=p.clientX; ly=p.clientY; moved=true; }
        }
        e.preventDefault();
      }
      function onEnd(){
        const dt=performance.now()-start, totalDx=Math.abs(lx-sx), totalDy=Math.abs(ly-sy);
        if(!moved && dt<=TAP_MAX_TIME_MS && totalDx<=TAP_MAX_MOVE_PX && totalDy<=TAP_MAX_MOVE_PX){ synthKey('ArrowUp'); }
      }
      el.addEventListener('touchstart', onStart, opts);
      el.addEventListener('touchmove',  onMove,  opts);
      el.addEventListener('touchend',   onEnd,   opts);
      el.addEventListener('pointerdown', onStart, opts);
      el.addEventListener('pointermove', onMove,  opts);
      el.addEventListener('pointerup',   onEnd,   opts);
    })();

    /* ---------- On-screen mobile controls ---------- */
    (function enableMobileControls(){
      const bar = document.getElementById('mobileControls');
      if (!bar) return;
      // Uzun basışta tekrar tetikleme (left/right/down)
      const repeatable = new Set(['ArrowLeft','ArrowRight','ArrowDown']);
      const timers = new Map();
      function startRepeat(key, el){
        synthKey(key);
        if (!repeatable.has(key)) return;
        const t1 = setTimeout(()=>{
          const t2 = setInterval(()=> synthKey(key), 70);
          timers.set(el, t2);
        }, 220);
        timers.set(el, t1);
      }
      function stopRepeat(el){
        const t = timers.get(el);
        if (!t) return;
        clearTimeout(t); clearInterval(t);
        timers.delete(el);
      }
      bar.querySelectorAll('.ctrl').forEach(btn=>{
        const key = btn.getAttribute('data-key');
        btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); startRepeat(key, btn); });
        btn.addEventListener('pointerup',   ()=> stopRepeat(btn));
        btn.addEventListener('pointercancel',()=> stopRepeat(btn));
        btn.addEventListener('pointerleave', ()=> stopRepeat(btn));
        btn.addEventListener('click', (e)=> e.preventDefault());
      });
    })();

    /* ---------- Turbo + Countdown ---------- */
    (function enableTurbo(){
      const TURBO = { enabled:true, startMs:220, minMs:80, rampEverySec:10, rampStepMs:20, sessionSeconds:60 };
      const $timer = document.getElementById('countdown');
      let dropMs = TURBO.startMs, dropTimer=null, rampTimer=null, tickTimer=null;
      let remaining = TURBO.sessionSeconds, running=false;

      function fmt(sec){ const m=String(Math.floor(sec/60)).padStart(2,'0'); const s=String(sec%60).padStart(2,'0'); return `${m}:${s}`; }
      function renderTimer(){ if($timer){ $timer.textContent = `⏱ ${fmt(remaining)}`; $timer.classList.toggle('warn', remaining<=10); } }

      function startTurbo(){
        if(!TURBO.enabled || running) return;
        stopTurbo(); running = true;
        remaining = TURBO.sessionSeconds; dropMs = TURBO.startMs; renderTimer();

        dropTimer = setInterval(()=> synthKey('ArrowDown'), dropMs);
        rampTimer = setInterval(()=>{
          if (dropMs <= TURBO.minMs) return;
          dropMs = Math.max(TURBO.minMs, dropMs - TURBO.rampStepMs);
          clearInterval(dropTimer);
          dropTimer = setInterval(()=> synthKey('ArrowDown'), dropMs);
        }, TURBO.rampEverySec * 1000);

        tickTimer = setInterval(()=>{
          remaining--; if (remaining<=10) vibrate(8); renderTimer();
          if (remaining<=0) endRound(true);
        }, 1000);
      }
      function stopTurbo(){ clearInterval(dropTimer); clearInterval(rampTimer); clearInterval(tickTimer); dropTimer=rampTimer=tickTimer=null; running=false; }
      async function endRound(auto=false){
        if (!running) return; stopTurbo();
        try{ await window.__miniapp?.flushXP?.(); }catch(_){}
        const b=document.getElementById('myRankBanner');
        if (b) b.textContent = auto ? 'Round finished — XP saved (Time up)' : 'Round finished — XP saved';
        if ($timer){ $timer.textContent='⏱ 00:00'; $timer.classList.add('warn'); }
        vibrate(30);
      }

      document.getElementById('startButton')?.addEventListener('click', startTurbo);
      document.getElementById('finishButton')?.addEventListener('click', ()=> endRound(false));
      renderTimer();

      // konsol kısayolları
      window.__turbo = {
        start:startTurbo, stop:stopTurbo, end:endRound,
        setMs:(ms)=>{ dropMs=ms; if(dropTimer){ clearInterval(dropTimer); dropTimer=setInterval(()=>synthKey('ArrowDown'), dropMs); } },
        setSeconds:(s)=>{ remaining=s; renderTimer(); }
      };
    })();

    // tetris.js erişsin
    window.__miniapp = { connectWallet, addXP, flushXP, fetchAndRenderMyRank };
  })();
  </script>
</body>
</html>
