<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TetriTiny — Farcaster Mini App</title>
  <link rel="icon" href="/icon.png" />
  <link rel="stylesheet" href="style.css" />
  <meta name="of:version" content="1.0" />
  <meta name="of:accepts:xmtp" content="false" />
</head>
<body>
  <div class="wrap">
    <h1>🎮 TetriTiny</h1>
    <canvas id="board" width="240" height="480"></canvas>
    <div class="side">
      <div class="row"><button id="left">◀️</button><button id="down">⬇️</button><button id="right">▶️</button></div>
      <div class="row"><button id="rotate">⤾ Rotate</button><button id="drop">⤓ Drop</button></div>
      <p class="hint">Use keyboard: ← → ↓, ↑ to rotate, Space to hard drop.</p>
      <p>Score: <span id="score">0</span> • Level: <span id="level">1</span> • Lines: <span id="lines">0</span></p>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
