<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TetriTiny</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <canvas id="tetris" width="240" height="400"></canvas>

    <div class="side">
      <h1>TetriTiny</h1>

      <div class="row">
        <button id="connect">🔗 Connect Wallet</button>
      </div>
      <p>Address: <span id="addr">Not connected</span></p>
      <p>XP: <span id="xp">0</span></p>

      <p>Score: <span id="score">0</span></p>
      <p>Lines: <span id="lines">0</span></p>
      <p>Level: <span id="level">1</span></p>

      <button id="startButton">Start</button>
      <button id="finishButton">Finish</button>

      <h2>Leaderboard</h2>
      <button id="showLeaderboard">Show Leaderboard</button>
      <ul id="leaderboard"></ul>
    </div>
  </div>

  <!-- Oyun -->
  <script src="tetris.js"></script>

  <!-- Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- Wallet + XP + Leaderboard -->
  <script>
  (function(){
    const CONTRACT_ADDRESS = "0x1F268942987EE88397e6263b3Eff23a2840F31AD";

    const BASE_PARAMS = {
      chainId: '0x2105', // Base mainnet
      chainName: 'Base Mainnet',
      nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
      rpcUrls: ['https://base.llamarpc.com'],
      blockExplorerUrls: ['https://basescan.org/']
    };
    const ABI = [
      "event XpRecorded(address indexed player, uint256 amount, uint256 newTotal, bytes32 sessionId)",
      "function record(uint256 amount, bytes32 sessionId) external",
      "function totalXp(address) view returns (uint256)"
    ];

    let currentAddress = null;
    let xp = 0;        
    let sessionXp = 0; 

    async function ensureBaseNetwork(provider) {
      const chainId = await provider.send('eth_chainId', []);
      if (chainId !== BASE_PARAMS.chainId) {
        try {
          await provider.send('wallet_switchEthereumChain', [{ chainId: BASE_PARAMS.chainId }]);
        } catch (e) {
          if (e.code === 4902 || String(e.message||'').includes('Unrecognized chain ID')) {
            await provider.send('wallet_addEthereumChain', [BASE_PARAMS]);
          } else { throw e; }
        }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) { alert("MetaMask / Coinbase Wallet gerekiyor."); throw new Error("no-ethereum"); }
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      await ensureBaseNetwork(provider);
      const signer = provider.getSigner();
      currentAddress = await signer.getAddress();
      document.getElementById("addr").textContent =
        currentAddress.slice(0,6) + "..." + currentAddress.slice(-4);
      loadXPFromStorage();
    }

    document.getElementById("connect").addEventListener("click", () => {
      connectWallet().catch(console.error);
    });

    // --- XP ---
    function loadXPFromStorage(){
      if (!currentAddress) return;
      const saved = localStorage.getItem("xp_" + currentAddress.toLowerCase());
      xp = saved ? parseInt(saved, 10) : 0;
      updateXPUI();
    }
    function addXP(amount){
      sessionXp += amount;
      xp += amount;
      if (currentAddress) {
        localStorage.setItem("xp_" + currentAddress.toLowerCase(), String(xp));
      }
      updateXPUI();
    }
    function updateXPUI(){
      const el = document.getElementById("xp");
      if (el) el.textContent = xp;
    }

    // --- On-chain XP kaydı ---
    async function flushXP() {
      if (!currentAddress || sessionXp <= 0) return;
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await ensureBaseNetwork(provider);
      const signer = provider.getSigner();
      const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

      const sessionId = ethers.utils.hexlify(ethers.utils.randomBytes(32));
      try {
        const tx = await contract.record(ethers.BigNumber.from(sessionXp), sessionId);
        await tx.wait();
        sessionXp = 0;
      } catch (e) {
        console.error("record() failed:", e);
        alert("XP kaydedilemedi: " + (e?.data?.message || e?.message || e));
      }
    }

    // ---- Farcaster handle getirici ----
    async function getFarcasterHandle(addr){
      try {
        const resp = await fetch(`https://api.neynar.com/v2/farcaster/user-by-verification?address=${addr}`, {
          headers: {
            "accept": "application/json",
            "api_key": "NEYNAR_ANON_API_KEY"   // public key
          }
        });
        const data = await resp.json();
        if (data && data.result && data.result.user && data.result.user.username) {
          return "@" + data.result.user.username;
        }
      } catch(e){
        console.error("farcaster lookup failed", addr, e);
      }
      return null;
    }

    // --- Leaderboard: eventleri tara + handle çöz ---
    async function fetchLeaderboard(){
      const provider = new ethers.providers.JsonRpcProvider("https://base.llamarpc.com");
      const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

      const currentBlock = await provider.getBlockNumber();
      const fromBlock = 0; // daha iyi performans için deploy block numarasını yaz
      const events = await contract.queryFilter("XpRecorded", fromBlock, currentBlock);

      const players = new Set();
      events.forEach(ev => players.add(ev.args.player));

      const results = [];
      for (const addr of players) {
        try {
          const xpVal = await contract.totalXp(addr);
          const handle = await getFarcasterHandle(addr);
          results.push({
            address: addr,
            xp: xpVal.toNumber(),
            name: handle ? handle : (addr.slice(0,6)+"..."+addr.slice(-4))
          });
        } catch (e) {
          console.error("fetch xp failed", addr, e);
        }
      }

      results.sort((a,b)=>b.xp - a.xp);
      renderLeaderboard(results);
    }

    function renderLeaderboard(list){
      const ul = document.getElementById("leaderboard");
      if (!ul) return;
      ul.innerHTML = "";
      list.forEach((item, i)=>{
        const li = document.createElement("li");
        li.textContent = `#${i+1} ${item.name} — ${item.xp} XP`;
        ul.appendChild(li);
      });
    }

    document.getElementById("showLeaderboard").addEventListener("click", fetchLeaderboard);

    // global
    window.__miniapp = { connectWallet, addXP, flushXP, fetchLeaderboard };
  })();
  </script>
</body>
</html>
